services:
  # 1. Isolated DB PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: med_mis_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: med_mis
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Check to start migrations
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d med_mis"]
      interval: 3s
      timeout: 3s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    container_name: med_mis_kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INSIDE'
      KAFKA_LISTENERS: 'INSIDE://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'INSIDE://kafka:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INSIDE:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Automatic migrations after DB start
  migrations:
    image: migrate/migrate:v4.17.0
    container_name: med_mis_migrations
    volumes:
      - ./migrations:/migrations
    command: -path=/migrations -database "postgres://postgres:postgres@postgres:5432/med_mis?sslmode=disable" up
    depends_on:
      postgres:
        condition: service_healthy

  # 3. Api starts after bigrations are done
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: med_mis_api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/med_mis?sslmode=disable
      - SERVER_ADDRESS=:8080
      - KAFKA_BROKERS=kafka:9092 
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

volumes:
  pgdata:
