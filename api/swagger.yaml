openapi: 3.0.3
info:
  title: Medical Information System (MIS) - Task Tracker API
  description: |-
    API модуля трекера рабочих задач для медицинского персонала (врачи, администраторы, медсестры).
  version: 1.0.0
servers:
  -
    url: http://localhost:8080/api/v1
    description: Локальный сервер разработки (Docker)

paths:
  /tasks:
    post:
      summary: Создать новую рабочую задачу
      description: Создает задачу в системе. По умолчанию новой задаче присваивается статус `NEW`. Принимает список имен тегов.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Задача успешно создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '400':
          description: Некорректные входные данные или дата выполнения в прошлом
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Внутренняя ошибка сервера

    get:
      summary: Получить список задач с фильтрацией
      description: Возвращает отсортированный по дате выполнения (due_date) список задач, соответствующих фильтрам. Каждая задача возвращается со своими тегами.
      parameters:
        -
          name: status
          in: query
          description: Фильтр по текущему статусу задачи
          required: false
          schema:
            $ref: '#/components/schemas/TaskStatus'
        -
          name: due_date_from
          in: query
          description: Нижняя граница даты выполнения (формат RFC3339)
          required: false
          schema:
            type: string
            format: date-time
            example: '2026-06-18T00:00:00Z'
        -
          name: due_date_to
          in: query
          description: Верхняя граница даты выполнения (формат RFC3339)
          required: false
          schema:
            type: string
            format: date-time
            example: '2026-06-19T23:59:59Z'
      responses:
        '200':
          description: Список задач успешно получен
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskResponse'
        '500':
          description: Внутренняя ошибка сервера

  /tasks/{id}:
    get:
      summary: Получить детальную информацию о задаче по ID
      description: Возвращает полные данные задачи, включая список привязанных тегов с их метаданными.
      parameters:
        -
          name: id
          in: path
          required: true
          description: Идентификатор задачи
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Данные задачи успешно получены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '400':
          description: Некорректный формат ID задачи
        '404':
          description: Задача с указанным ID не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Полное обновление существующей задачи
      description: Обновляет поля задачи и полностью перезаписывает Many-to-Many связи с тегами. Несуществующие в справочнике теги тихо пропускаются (Silent Fail).
      parameters:
        -
          name: id
          in: path
          required: true
          description: Идентификатор задачи
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Задача успешно обновлена
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: updated
        '400':
          description: Некорректный JSON или невалидные данные
        '404':
          description: Задача не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Удалить задачу из системы
      parameters:
        -
          name: id
          in: path
          required: true
          description: Идентификатор задачи
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Задача успешно удалена (нет содержимого в ответе)
        '400':
          description: Некорректный формат ID
        '404':
          description: Задача не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tags:
    get:
      summary: Получить справочник тегов МИС
      description: Возвращает полный список доступных тегов (включая системные) для инициализации интерфейса и ComboBox форм на фронтенде.
      responses:
        '200':
          description: Успешный возврат справочника
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TagResponse'
        '500':
          description: Внутренняя ошибка сервера

    post:
      summary: Создать новый кастомный тег в справочнике
      description: Явное добавление нового тега администратором МИС. По умолчанию создается с флагом `is_system = false`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagCreateRequest'
      responses:
        '201':
          description: Тег успешно создан в справочнике
        '400':
          description: Невалидные входные данные или некорректный JSON
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Внутренняя ошибка сервера

  /tags/{name}:
    put:
      summary: Изменить имя существующего кастомного тега
      description: Переименовывает тег в справочнике МИС. Связанные задачи каскадно обновляются силами СУБД (ON UPDATE CASCADE). Изменение системных тегов запрещено.
      parameters:
        -
          name: name
          in: path
          required: true
          description: Текущее уникальное имя тега для изменения
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagUpdateRequest'
      responses:
        '200':
          description: Тег успешно переименован
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: updated
        '400':
          description: Невалидное новое имя или некорректный JSON
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Попытка изменения защищенного системного тега
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Указанный тег не найден в справочнике
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Внутренняя ошибка сервера

    delete:
      summary: Удалить кастомный тег из системы
      description: Удаляет тег из справочника МИС. Связи с задачами вычищаются каскадно на уровне БД (ON DELETE CASCADE). Удаление системных тегов под запретом.
      parameters:
        -
          name: name
          in: path
          required: true
          description: Уникальное имя тега для удаления
          schema:
            type: string
      responses:
        '204':
          description: Тег успешно удален из системы
        '403':
          description: Попытка удаления защищенного системного тега
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Внутренняя ошибка сервера
components:
  schemas:
    TaskStatus:
      type: string
      enum: [NEW, IN_PROGRESS, DONE, CANCELED]
      example: NEW

    CreateTaskRequest:
      type: object
      required:
        - title
        - due_date
      properties:
        title:
          type: string
          description: Краткое название медицинской задачи
          example: 'Сделать обход пациентов'
        description:
          type: string
          description: Подробное описание действий по задаче
          example: 'Проверить пульс и давление у пациентов в палатах 3 и 4.'
        due_date:
          type: string
          format: date-time
          description: Запланированное время выполнения задачи (обязательно в будущем)
          example: '2026-12-31T15:00:00Z'
        tags:
          type: array
          description: Список имен тегов, выбранных на форме создания
          items:
            type: string
          example: ['отчетность', 'операции']

    UpdateTaskRequest:
      type: object
      required:
        - title
        - due_date
        - status
      properties:
        title:
          type: string
          example: 'Сделать обход пациентов (Срочно)'
        description:
          type: string
          example: 'Проверить пульс, давление и выдать новые назначения.'
        due_date:
          type: string
          format: date-time
          example: '2026-12-31T16:00:00Z'
        status:
          $ref: '#/components/schemas/TaskStatus'
        tags:
          type: array
          description: Список имен тегов, выбранных на форме редактирования (перетирает старые связи)
          items:
            type: string
          example: ['операции', 'звонок']

    TaskResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        title:
          type: string
          example: 'Сделать обход пациентов'
        description:
          type: string
          example: 'Проверить пульс и давление у пациентов в палатах 3 и 4.'
        due_date:
          type: string
          format: date-time
          example: '2026-12-31T15:00:00Z'
        status:
          $ref: '#/components/schemas/TaskStatus'
        tags:
          type: array
          description: Список объектов тегов с их метаданными
          items:
            $ref: '#/components/schemas/TagResponse'

    TagCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 50
          example: 'консилиум'

    TagUpdateRequest:
      type: object
      required:
        - new_name
      properties:
        new_name:
          type: string
          maxLength: 50
          example: 'Оториноларинголог'

    TagResponse:
      type: object
      properties:
        name:
          type: string
          example: 'отчетность'
        is_system:
          type: boolean
          example: true

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: 'task not found'